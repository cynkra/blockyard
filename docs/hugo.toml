baseURL = "/"
languageCode = "en-us"
title = "Blockyard"
theme = "hugo-book"

enableGitInfo = true

[params]
  BookTheme = "auto"
  BookToC = true
  BookSection = "docs"
  BookRepo = "https://github.com/cynkra/blockyard"
  BookSearch = true
  BookDateFormat = "January 2, 2006"
  BookPortableLinks = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser.attribute]
      block = true
  [markup.highlight]
    # Emit Chroma classes instead of inline styles so we can theme code
    # blocks via CSS scoped under html[data-theme="..."]. See _chroma.scss.
    noClasses = false
    style = "catppuccin-mocha"

[menu]
  [[menu.after]]
    name = "GitHub"
    url = "https://github.com/cynkra/blockyard"
    weight = 10
