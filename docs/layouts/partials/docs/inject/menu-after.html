<div class="bk-theme-row">
  <span class="bk-theme-row__label">Theme</span>
  <button type="button" class="bk-theme-toggle" role="switch" aria-label="Toggle dark mode">
    <svg class="bk-theme-toggle__icon bk-theme-toggle__sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </svg>
    <svg class="bk-theme-toggle__icon bk-theme-toggle__moon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
    <span class="bk-theme-toggle__thumb"></span>
  </button>
</div>
<script>
(function(){
  var btn = document.querySelector('.bk-theme-toggle');
  if (!btn) return;
  function syncAria() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    btn.setAttribute('aria-checked', String(dark));
  }
  btn.addEventListener('click', function(){
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    syncAria();
  });
  syncAria();
})();
</script>
