<script>
// TOC scroll spy: highlight the heading whose section the reader is in.
// Looks at all headings referenced from the right-side TOC, finds the
// one closest to (but past) the top of the viewport, and adds .active
// to its TOC link.
(function() {
  var toc = document.querySelector('.book-toc nav');
  if (!toc) return;

  var links = Array.from(toc.querySelectorAll('a[href^="#"]'));
  if (links.length === 0) return;

  var entries = links
    .map(function(link) {
      var id = decodeURIComponent(link.getAttribute('href').slice(1));
      var el = document.getElementById(id);
      return el ? { link: link, el: el } : null;
    })
    .filter(Boolean);
  if (entries.length === 0) return;

  var current = null;
  function update() {
    var fromTop = window.scrollY + 120; // header offset
    var found = entries[0];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].el.offsetTop <= fromTop) {
        found = entries[i];
      } else {
        break;
      }
    }
    if (found !== current) {
      if (current) current.link.classList.remove('active');
      found.link.classList.add('active');
      current = found;
    }
  }

  update();
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() { update(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
})();
</script>
