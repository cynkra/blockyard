[server]
bind             = "0.0.0.0:8080"
shutdown_timeout = "30s"

[docker]
socket          = "/var/run/docker.sock"
image           = "ghcr.io/rocker-org/r-ver:4.4.3"
shiny_port      = 3838
rv_version      = "v0.19.0"
service_network = "blockyard-services"

[storage]
bundle_server_path = "/data/bundles"
bundle_worker_path = "/app"
bundle_retention   = 50
max_bundle_size    = 104857600

[proxy]
ws_cache_ttl         = "60s"
health_interval      = "15s"
worker_start_timeout = "60s"
max_workers          = 100
log_retention        = "1h"
session_idle_ttl     = "1h"
idle_worker_timeout  = "5m"

# Database, OIDC, OpenBao, and board_storage settings are provided
# via environment variables in docker-compose.yml.
