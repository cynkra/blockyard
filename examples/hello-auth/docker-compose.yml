services:

  # --- Dex: OIDC identity provider ---
  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yml"]
    volumes:
      - ./dex.yml:/etc/dex/config.yml:ro
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5556/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 20

  # --- OpenBao: secrets management ---
  openbao:
    image: ghcr.io/openbao/openbao:latest
    command: ["server", "-dev", "-dev-root-token-id=root-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root-dev-token
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- One-shot init: configure OpenBao JWT auth + policies ---
  openbao-init:
    image: curlimages/curl:latest
    depends_on:
      openbao:
        condition: service_healthy
      dex:
        condition: service_healthy
    volumes:
      - ./setup-openbao.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: root-dev-token
      DEX_ISSUER: http://dex:5556

  # --- Blockyard: Shiny app hosting platform ---
  blockyard:
    image: ghcr.io/cynkra/blockyard:latest
    depends_on:
      openbao-init:
        condition: service_completed_successfully
      dex:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data/bundles
    environment:
      # Control-plane bearer token (for deploy.sh)
      BLOCKYARD_SERVER_TOKEN: my-secret-token
      # OIDC (Dex)
      BLOCKYARD_SERVER_EXTERNAL_URL: http://localhost:8080
      BLOCKYARD_SERVER_SESSION_SECRET: change-me-to-something-random
      BLOCKYARD_OIDC_ISSUER_URL: http://dex:5556
      BLOCKYARD_OIDC_CLIENT_ID: blockyard
      BLOCKYARD_OIDC_CLIENT_SECRET: blockyard-dex-secret
      # OpenBao
      BLOCKYARD_OPENBAO_ADDRESS: http://openbao:8200
      BLOCKYARD_OPENBAO_ADMIN_TOKEN: root-dev-token
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
