[server]
bind             = "0.0.0.0:8080"
shutdown_timeout = "30s"

[docker]
socket     = "/var/run/docker.sock"
image      = "ghcr.io/cynkra/blockyard-worker:4.4.3"
shiny_port = 3838
pak_version = "stable"

[storage]
bundle_server_path = "/data/bundles"
bundle_worker_path = "/app"
bundle_retention   = 50
max_bundle_size    = 104857600

[database]
path = "/data/db/blockyard.db"

[proxy]
ws_cache_ttl         = "60s"
health_interval      = "15s"
worker_start_timeout = "60s"
max_workers          = 100
log_retention        = "1h"
# session_idle_ttl   = "0"
idle_worker_timeout  = "5m"

# OIDC settings are provided via environment variables in docker-compose.yml.
# No [openbao] section — this example runs without a secrets manager.
# session_secret is set explicitly via env var.
