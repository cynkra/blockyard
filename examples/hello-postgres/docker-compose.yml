networks:
  default:
  services:
    name: blockyard-services

volumes:
  pgdata:

services:

  # --- Dex: OIDC identity provider ---
  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yml"]
    volumes:
      - ./dex.yml:/etc/dex/config.yml:ro
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5556/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 20

  # --- PostgreSQL: primary database (blockyard + board storage) ---
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: blockyard
      POSTGRES_USER: blockyard
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks: [default, services]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "blockyard"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- OpenBao: JWT auth + AppRole + DB secrets engine ---
  openbao:
    image: ghcr.io/openbao/openbao:2.5.2
    command: ["server", "-dev", "-dev-root-token-id=root-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root-dev-token
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks: [default, services]
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- One-shot init: configure OpenBao + DB secrets engine + policies ---
  init:
    image: curlimages/curl:latest
    depends_on:
      openbao:
        condition: service_healthy
      dex:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: root-dev-token
      DEX_ISSUER: http://localhost:5556
      DEX_INTERNAL: http://dex:5556
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: blockyard
      PG_ADMIN_USER: vault_db_admin
      PG_ADMIN_PASSWORD: dev-password

  # --- Blockyard: Shiny app hosting platform ---
  blockyard:
    image: ghcr.io/cynkra/blockyard:main
    depends_on:
      init:
        condition: service_completed_successfully
      dex:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data/bundles
      - ./blockyard.toml:/etc/blockyard/blockyard.toml:ro
    environment:
      # OIDC (Dex)
      BLOCKYARD_SERVER_EXTERNAL_URL: http://localhost:8080
      BLOCKYARD_OIDC_ISSUER_URL: http://localhost:5556
      BLOCKYARD_OIDC_ISSUER_DISCOVERY_URL: http://dex:5556
      BLOCKYARD_OIDC_CLIENT_ID: blockyard
      BLOCKYARD_OIDC_CLIENT_SECRET: blockyard-dex-secret
      BLOCKYARD_OIDC_INITIAL_ADMIN: Cg1kZW1vLXVzZXItMDAxEgVsb2NhbA
      BLOCKYARD_SERVER_BOOTSTRAP_TOKEN: by_bootstrap_for_examples
      # OpenBao (AppRole auth — session_secret is auto-generated via vault)
      BLOCKYARD_OPENBAO_ADDRESS: http://openbao:8200
      BLOCKYARD_OPENBAO_ROLE_ID: blockyard-server
      BLOCKYARD_OPENBAO_SECRET_ID: dev-secret-id-for-local-use-only
      # Database + board storage
      BLOCKYARD_DATABASE_DRIVER: postgres
      BLOCKYARD_DATABASE_URL: postgres://blockyard:dev-password@postgres:5432/blockyard?sslmode=disable
      BLOCKYARD_DATABASE_BOARD_STORAGE: "true"
      BLOCKYARD_DATABASE_VAULT_DB_CONNECTION: blockyard
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
