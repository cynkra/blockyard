[server]
bind             = "0.0.0.0:8080"
shutdown_timeout = "30s"

[docker]
socket          = "/var/run/docker.sock"
image           = "ghcr.io/cynkra/blockyard-worker:4.4.3"
shiny_port      = 3838
pak_version     = "stable"
service_network = "blockyard-services"

[storage]
bundle_server_path = "/data/bundles"
bundle_worker_path = "/app"
bundle_retention   = 50
max_bundle_size    = 104857600

[proxy]
ws_cache_ttl         = "60s"
health_interval      = "15s"
worker_start_timeout = "60s"
max_workers          = 100
log_retention        = "1h"
# session_idle_ttl   = "0"
idle_worker_timeout  = "5m"

# Database, OIDC, OpenBao, and board_storage settings are provided
# via environment variables in docker-compose.yml:
#
#   BLOCKYARD_DATABASE_DRIVER              = "postgres"
#   BLOCKYARD_DATABASE_URL                 = "postgres://…"
#   BLOCKYARD_DATABASE_BOARD_STORAGE       = "true"
#   BLOCKYARD_DATABASE_VAULT_DB_CONNECTION = "blockyard"  # matches setup.sh
#
# Optional defaults (uncomment to override):
#   # BLOCKYARD_DATABASE_VAULT_MOUNT           = "database"
#   # BLOCKYARD_DATABASE_VAULT_ROTATION_PERIOD = "24h"
