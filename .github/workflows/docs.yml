name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.4"
          extended: true
      - run: hugo --minify --baseURL https://cynkra.github.io/blockyard/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        # TODO: bump to v5 once released with node24 support
        uses: actions/deploy-pages@v5
