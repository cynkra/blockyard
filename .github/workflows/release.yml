name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/cynkra/blockyard

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  e2e:
    needs: ci
    uses: ./.github/workflows/merge.yml

  server-image:
    needs: e2e
    uses: ./.github/workflows/server.yml

  scan-image:
    needs: server-image
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.SERVER_IMAGE }}:build-linux-amd64
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  server-manifest:
    needs: scan-image
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" \
              "${{ env.SERVER_IMAGE }}:build-linux-amd64" \
              "${{ env.SERVER_IMAGE }}:build-linux-arm64"
          done <<< "$TAGS"

  binaries:
    needs: e2e
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o blockyard-linux-${{ matrix.goarch }} ./cmd/blockyard

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goarch }}
          path: blockyard-linux-${{ matrix.goarch }}
          retention-days: 1

  github-release:
    needs: [server-manifest, binaries]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      # TODO: bump to v3 once released with node24 support
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: blockyard-linux-*
