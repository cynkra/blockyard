name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/cynkra/blockyard

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  tests:
    needs: ci
    uses: ./.github/workflows/merge.yml

  server-image:
    needs: tests
    uses: ./.github/workflows/server.yml
    with:
      version: ${{ github.ref_name }}

  scan-image:
    needs: server-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      packages: read
    strategy:
      # Scan amd64 only — arch-specific CVE delta is typically zero
      # and doubling the matrix doubles CI cost. Trivy per variant
      # (docker / process / everything) catches variant-specific
      # base-image issues.
      fail-fast: false
      matrix:
        include:
          - variant: docker
            suffix: -docker
          - variant: process
            suffix: -process
          - variant: everything
            suffix: ""
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/scan-image
        with:
          image-ref: ${{ env.SERVER_IMAGE }}${{ matrix.suffix }}:build-linux-amd64
          variant: ${{ matrix.variant }}
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-findings: "true"

  # Runs even when scan-image fails (fail-on-findings=true on release)
  # so CVEs that block the release still surface in the Security tab.
  upload-sarif:
    needs: scan-image
    if: ${{ always() && needs.scan-image.result != 'skipped' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/upload-sarif-merged
        with:
          category: trivy-server

  server-manifest:
    needs: scan-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: docker
            suffix: -docker
          - variant: process
            suffix: -process
          - variant: everything
            suffix: ""
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.SERVER_IMAGE }}${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest (${{ matrix.variant }})
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" \
              "${{ env.SERVER_IMAGE }}${{ matrix.suffix }}:build-linux-amd64" \
              "${{ env.SERVER_IMAGE }}${{ matrix.suffix }}:build-linux-arm64"
          done <<< "$TAGS"

  # server-smoke pulls each variant's amd64 image and checks
  # /healthz responds. Catches packaging regressions (bad Dockerfile,
  # broken entrypoint, incompatible seccomp profile path) against
  # the actual published artifact — the dep-graph test in CI catches
  # source-level regressions, this job catches runtime ones.
  server-smoke:
    needs: server-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: docker
            suffix: -docker
          - variant: process
            suffix: -process
          - variant: everything
            suffix: ""
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and smoke-test (${{ matrix.variant }})
        run: |
          set -euo pipefail
          IMAGE="${{ env.SERVER_IMAGE }}${{ matrix.suffix }}:build-linux-amd64"
          docker pull "$IMAGE"
          SECCOMP=""
          BACKEND_ARGS=()
          case "${{ matrix.variant }}" in
            docker|everything)
              # Baked-in config defaults backend=docker, which needs
              # a reachable Docker daemon and a persistent bind mount
              # covering storage.bundle_server_path (/data/bundles) —
              # the detectMountMode check rejects an unmounted /data
              # so sibling worker containers would see a different
              # inode. Mount the runner's socket and an empty host
              # dir for /data. SKIP_PREFLIGHT avoids the rocker/r-ver
              # pull and sibling-container checks, which are
              # orthogonal to whether the server can answer /healthz.
              BACKEND_ARGS=(
                -v /var/run/docker.sock:/var/run/docker.sock
                -v /tmp/smoke-data:/data
                -e BLOCKYARD_SERVER_SKIP_PREFLIGHT=true
              )
              ;;
          esac
          if [ "${{ matrix.variant }}" = "process" ]; then
            # The process-only build does not register a docker factory,
            # so the baked-in backend=docker fails fast at startup.
            # Override via env vars: SERVER_BACKEND selects the process
            # factory; PROCESS_BWRAP_PATH is the sentinel that forces
            # applyEnvOverrides to auto-construct the [process] section
            # (processDefaults fills in the remaining knobs).
            # SKIP_PREFLIGHT bypasses bwrap_host_uid_mapping, which
            # fails inside a rootful GH runner container because the
            # outer container lacks the user-namespace privileges
            # bwrap needs to remap uids as seen from host /proc. The
            # smoke test only checks /healthz, not worker spawning.
            BACKEND_ARGS=(
              -e BLOCKYARD_SERVER_BACKEND=process
              -e BLOCKYARD_SERVER_SKIP_PREFLIGHT=true
              -e BLOCKYARD_PROCESS_BWRAP_PATH=/usr/bin/bwrap
            )
          fi
          # Bind on 0.0.0.0 so `-p 18080:8080` reaches the server —
          # the baked-in config binds 127.0.0.1 (fronted by a reverse
          # proxy in production), which Docker's published-port NAT
          # can't target.
          BACKEND_ARGS+=(-e BLOCKYARD_SERVER_BIND=0.0.0.0:8080)
          if [ "${{ matrix.variant }}" != "docker" ]; then
            # Override the entrypoint — the image's default entrypoint
            # is ["blockyard", "--config", ...], so without
            # --entrypoint the `cat` ends up as an arg to blockyard.
            docker run --rm --entrypoint cat "$IMAGE" /etc/blockyard/seccomp.json > /tmp/seccomp.json
            SECCOMP="--security-opt seccomp=/tmp/seccomp.json"
          fi
          docker run -d --name smoke ${SECCOMP} "${BACKEND_ARGS[@]}" -p 18080:8080 "$IMAGE" || true
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/healthz >/dev/null; then
              docker rm -f smoke
              exit 0
            fi
            sleep 1
          done
          docker logs smoke
          docker rm -f smoke
          exit 1

  # seccomp-blob publishes the two seccomp release assets native-mode
  # operators consume: the compiled bwrap BPF profile and the outer-
  # container JSON profile. The BPF goes through
  # cmd/seccomp-compile (same libseccomp-dev + CGO invocation the
  # variant Dockerfiles run); the JSON ships as-is from the repo so
  # operators can apply it via `--security-opt seccomp=<path>`
  # without pulling an image or installing the `by` CLI.
  seccomp-blob:
    needs: tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install libseccomp-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libseccomp-dev
      - name: Build seccomp-compile (CGO)
        run: CGO_ENABLED=1 go build -o /tmp/seccomp-compile ./cmd/seccomp-compile
      - name: Compile bwrap BPF profile
        run: /tmp/seccomp-compile -in internal/seccomp/blockyard-bwrap.json -out /tmp/blockyard-bwrap-seccomp.bpf
      - uses: actions/upload-artifact@v7
        with:
          name: seccomp-bwrap-bpf
          path: /tmp/blockyard-bwrap-seccomp.bpf
          retention-days: 1
      - uses: actions/upload-artifact@v7
        with:
          name: seccomp-outer-json
          path: internal/seccomp/blockyard-outer.json
          retention-days: 1
      # AppArmor profile — same release channel as the seccomp
      # profiles. Renamed to `blockyard-apparmor` so the published
      # filename is unambiguous (the source filename `blockyard`
      # alone would collide with the server binary on the release
      # page).
      - name: Stage AppArmor profile with release filename
        run: cp internal/apparmor/blockyard /tmp/blockyard-apparmor
      - uses: actions/upload-artifact@v7
        with:
          name: apparmor-profile
          path: /tmp/blockyard-apparmor
          retention-days: 1

  binaries:
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server (Linux only)
          - cmd: blockyard
            goos: linux
            goarch: amd64
          - cmd: blockyard
            goos: linux
            goarch: arm64
          # CLI client (all platforms)
          - cmd: by
            goos: linux
            goarch: amd64
          - cmd: by
            goos: linux
            goarch: arm64
          - cmd: by
            goos: darwin
            goarch: amd64
          - cmd: by
            goos: darwin
            goarch: arm64
          - cmd: by
            goos: windows
            goarch: amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: peaceiris/actions-hugo@v3
        if: matrix.cmd == 'blockyard'
        with:
          hugo-version: "0.147.4"
          extended: true
      - name: Build documentation
        if: matrix.cmd == 'blockyard'
        run: cd docs && hugo --baseURL /docs/ --minify && rm -rf ../internal/docs/dist && cp -r public ../internal/docs/dist

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""; if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.cmd }}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/${{ matrix.cmd }}

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.cmd }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.cmd }}-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  github-release:
    needs: [server-manifest, binaries, seccomp-blob]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: seccomp-bwrap-bpf
          path: .
      - uses: actions/download-artifact@v8
        with:
          name: seccomp-outer-json
          path: .
      - uses: actions/download-artifact@v8
        with:
          name: apparmor-profile
          path: .

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            blockyard-*
            by-*
            blockyard-bwrap-seccomp.bpf
            blockyard-outer.json
            blockyard-apparmor
