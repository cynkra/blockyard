name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/cynkra/blockyard

jobs:
  server-image:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: slug
        run: echo "platform=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.SERVER_IMAGE }}:build-${{ steps.slug.outputs.platform }}
          push: true

  server-manifest:
    needs: server-image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker buildx imagetools create -t "$tag" \
              "${{ env.SERVER_IMAGE }}:build-linux-amd64" \
              "${{ env.SERVER_IMAGE }}:build-linux-arm64"
          done

  github-release:
    needs: server-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --locked

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/release/blockyard
