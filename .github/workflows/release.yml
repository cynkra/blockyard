name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/cynkra/blockyard

jobs:
  server-image:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: slug
        run: echo "platform=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.SERVER_IMAGE }}:build-${{ steps.slug.outputs.platform }}
          push: true

  server-manifest:
    needs: server-image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" \
              "${{ env.SERVER_IMAGE }}:build-linux-amd64" \
              "${{ env.SERVER_IMAGE }}:build-linux-arm64"
          done <<< "$TAGS"

  github-release:
    needs: server-manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: CGO_ENABLED=0 go build -o blockyard ./cmd/blockyard

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: blockyard
