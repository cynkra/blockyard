name: Publish

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 6 AM UTC — rebuild to pick up base image patches

permissions:
  contents: write
  packages: write

concurrency:
  group: publish
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/cynkra/blockyard

jobs:
  cli-binaries:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          VERSION="$(git describe --always --dirty)"
          EXT=""; if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o by-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/by

      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: by-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  cli-release:
    if: github.event_name != 'schedule'
    needs: cli-binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          merge-multiple: true

      - name: Upsert main pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(git describe --always --dirty)"
          gh release delete main --cleanup-tag --yes 2>/dev/null || true
          gh release create main \
            --title "${VERSION}" \
            --notes "Built from main at $(git rev-parse HEAD)" \
            --prerelease \
            by-*

  server-image:
    uses: ./.github/workflows/server.yml
    with:
      version: main

  # The linux/arm64 server-image legs run on GitHub's *partner*
  # ubuntu-24.04-arm hosted runners (Arm Limited image), a smaller and
  # less-baked pool than the first-party amd64 fleet. Intermittently a
  # leg's runner is reclaimed at job startup: the job dies during
  # docker/setup-buildx-action — before build-push ever runs — with
  # "The runner has received a shutdown signal". The amd64 legs are
  # untouched, but a single dead arm64 leg fails server-image and skips
  # the manifest, so :main* is left unpublished for that commit (#380).
  # A plain re-run on a fresh runner always succeeds, so do it
  # automatically. fromJSON(run_attempt) < 3 caps it at 3 total attempts
  # (2 retries) to bound the cost of a genuinely broken build — after
  # that the real failure surfaces. gh run rerun --failed re-runs only
  # the failed jobs (and their dependents); this job is a dependent of
  # server-image, so it re-evaluates each attempt and stops itself once
  # server-image goes green or the attempt cap is hit.
  rerun-on-failure:
    needs: server-image
    if: ${{ failure() && fromJSON(github.run_attempt) < 3 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs on a fresh runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh run rerun "${{ github.run_id }}" --failed

  scan-image:
    needs: server-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: everything
            image_suffix: ""
          - variant: docker
            image_suffix: -docker
          - variant: process
            image_suffix: -process
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/scan-image
        with:
          image-ref: ${{ env.IMAGE }}${{ matrix.image_suffix }}:build-linux-amd64
          variant: ${{ matrix.variant }}
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

  upload-sarif:
    needs: scan-image
    if: ${{ always() && needs.scan-image.result != 'skipped' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/upload-sarif-merged
        with:
          category: trivy-server

  manifest:
    needs: [server-image, scan-image]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: everything
            image_suffix: ""
          - variant: docker
            image_suffix: -docker
          - variant: process
            image_suffix: -process
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest (${{ matrix.variant }})
        run: |
          # Tag the manifest with both the rolling ":main" pointer and
          # the immutable per-commit ":<git-describe>" tag. ":main" is
          # what the current orchestrator pins to (digest-compared
          # post-pull); ":<VERSION>" is the install target older builds
          # resolve (the GH release Name, which equals git describe).
          # Without it, a build published before the #360 :main fix is
          # stranded: it asks Docker for a per-commit tag that was never
          # pushed and can never update itself forward (#378). VERSION
          # uses the same `git describe --always --dirty` as the
          # cli-binaries/cli-release jobs so the tags line up exactly.
          VERSION="$(git describe --always --dirty)"
          IMG="${{ env.IMAGE }}${{ matrix.image_suffix }}"
          docker buildx imagetools create \
            -t "${IMG}:main" \
            -t "${IMG}:${VERSION}" \
            "${IMG}:build-linux-amd64" \
            "${IMG}:build-linux-arm64"

  # Registry contract test: assert that the install target the
  # orchestrator's main-channel resolver constructs actually exists
  # on ghcr.io. This is the test issue #360 was missing — mock-based
  # unit tests passed while production was asking Docker to pull a
  # tag the workflow never published. Build-tag-gated so it only
  # runs after a publish (pre-publish runs in ci.yml are SKIP'd
  # automatically).
  registry-contract:
    needs: manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify install targets are pullable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -tags registry_contract -run Pullable -v ./internal/update/...
