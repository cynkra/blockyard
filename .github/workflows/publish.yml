name: Publish

on:
  push:
    branches: [main]

permissions:
  packages: write

env:
  IMAGE: ghcr.io/cynkra/blockyard

jobs:
  server-image:
    uses: ./.github/workflows/server-image.yml

  scan-image:
    needs: server-image
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: ${{ env.IMAGE }}:build-linux-amd64
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  manifest:
    needs: [server-image, scan-image]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t "${{ env.IMAGE }}:main" \
            "${{ env.IMAGE }}:build-linux-amd64" \
            "${{ env.IMAGE }}:build-linux-arm64"
