name: CI

on:
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch="${{ github.head_ref }}"
          prefix_re='^(feat|fix|ci|docs|refactor|chore)/'
          slug_re='^[a-z0-9][a-z0-9-]{0,19}$'
          slug="${branch#*/}"
          if ! echo "$branch" | grep -qE "$prefix_re"; then
            echo "::error::Branch '$branch' must start with feat/, fix/, ci/, docs/, refactor/, or chore/"
            exit 1
          fi
          if ! echo "$slug" | grep -qE "$slug_re"; then
            echo "::error::Slug '$slug' must be lowercase alphanumeric + hyphens, max 20 chars"
            exit 1
          fi
          hyphens=$(echo "$slug" | tr -cd '-' | wc -c)
          if [ "$hyphens" -gt 3 ]; then
            echo "::error::Slug '$slug' has $hyphens hyphens (max 3)"
            exit 1
          fi

  check:
    needs: [branch]
    if: ${{ !cancelled() && needs.branch.result != 'failure' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    env:
      BLOCKYARD_TEST_POSTGRES_URL: postgres://blockyard:blockyard@localhost:5432/blockyard_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify Go version consistency
        run: |
          GO_MINOR=$(awk '/^go /{print $2}' go.mod | grep -oP '^\d+\.\d+')
          for f in docker/server.Dockerfile .devcontainer/Dockerfile; do
            if ! grep -qP "golang:${GO_MINOR}|GO_VERSION=${GO_MINOR}" "$f"; then
              echo "::error file=$f::Go version mismatch — expected $GO_MINOR (from go.mod)" && exit 1
            fi
          done
      - uses: golangci/golangci-lint-action@v7
      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go test -coverprofile=coverage-check.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-check
          path: coverage-check.out

  docker:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull alpine:latest && docker pull ghcr.io/rocker-org/r-ver:latest && docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - run: sudo --preserve-env=PATH go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./... ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out

  idp:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull quay.io/keycloak/keycloak:26.0
      - run: go test -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out

  openbao:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull ghcr.io/openbao/openbao:latest
      - run: go test -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out

  coverage:
    runs-on: ubuntu-latest
    needs: [check, docker, idp, openbao]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - uses: codecov/codecov-action@v5
        with:
          files: coverage-check.out,coverage-docker.out,coverage-idp.out,coverage-openbao.out
          flags: unit,docker,idp,openbao
          fail_ci_if_error: true
