name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      job:
        description: "Run a single job (leave empty for all)"
        type: choice
        options:
          - ""
          - unit
          - cli
          - docker
          - idp
          - openbao
          - pak
          - ui

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    if: github.event_name != 'merge_group' && (inputs.job == '' || inputs.job == 'unit')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    env:
      BLOCKYARD_TEST_POSTGRES_URL: postgres://blockyard:blockyard@localhost:5432/blockyard_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify Go version consistency
        run: |
          GO_MINOR=$(awk '/^go /{print $2}' go.mod | grep -oP '^\d+\.\d+')
          for f in docker/server.Dockerfile .devcontainer/Dockerfile; do
            if ! grep -qP "golang:${GO_MINOR}|GO_VERSION=${GO_MINOR}" "$f"; then
              echo "::error file=$f::Go version mismatch — expected $GO_MINOR (from go.mod)" && exit 1
            fi
          done
      - uses: golangci/golangci-lint-action@v7
      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go test -coverprofile=coverage-unit.out -coverpkg=./internal/...,./cmd/by/... ./internal/... ./cmd/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1

  cli:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'cli')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run CLI integration tests with coverage
        run: |
          export GOCOVERDIR=$(mktemp -d)
          go test -tags cli_test -count=1 ./cmd/by/...
          go tool covdata textfmt -i="$GOCOVERDIR" -o=coverage-cli.out
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-cli
          path: coverage-cli.out
          retention-days: 1

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'docker')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          images: alpine:3.21
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/proxy/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out
          retention-days: 1

  pak:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'pak')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -v -tags pak_test -coverprofile=coverage-pak.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/server/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-pak
          path: coverage-pak.out
          retention-days: 1

  idp:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'idp')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull quay.io/keycloak/keycloak:26.0
      - run: go test -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./internal/...,./cmd/by/... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out
          retention-days: 1

  openbao:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'openbao')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull ghcr.io/openbao/openbao:2.5.2
      - run: go test -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./internal/...,./cmd/by/... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out
          retention-days: 1

  ui:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'ui')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags ui_test -coverprofile=coverage-ui.out -coverpkg=./internal/...,./cmd/by/... ./internal/ui/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-ui
          path: coverage-ui.out
          retention-days: 1

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'merge_group' && github.event_name != 'push' && inputs.job == ''
    needs: [unit, cli, docker, idp, openbao, pak, ui]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Enforce 80% coverage threshold
        run: |
          head -1 coverage-unit.out > merged.out
          tail -n +2 -q coverage-*.out | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
