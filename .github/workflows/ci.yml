name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: go vet ./...
      - run: go test -coverprofile=coverage-check.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-check
          path: coverage-check.out

  docker:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: docker pull alpine:latest && docker pull ghcr.io/rocker-org/r-ver:latest && docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - run: sudo go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./... ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out

  idp:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: docker pull quay.io/keycloak/keycloak:26.0
      - run: go test -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out

  openbao:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: docker pull ghcr.io/openbao/openbao:latest
      - run: go test -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Build blockyard image from source
        run: docker build -t ghcr.io/cynkra/blockyard:latest -f docker/server.Dockerfile .
      - name: Pre-pull images used by examples
        run: |
          docker pull dexidp/dex:v2.41.1
          docker pull ghcr.io/openbao/openbao:latest
          docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - name: Block cloud metadata endpoint for containers
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || true
      - name: Run e2e tests
        run: sudo go test -v -tags e2e -timeout 20m ./e2e/...
      - name: Dump compose logs on failure
        if: failure()
        run: |
          for dir in examples/hello-shiny examples/hello-blockr; do
            echo "=== $dir ==="
            docker compose -f "$dir/docker-compose.yml" logs --no-color 2>/dev/null || true
            docker compose -f "$dir/docker-compose.yml" down -v --remove-orphans 2>/dev/null || true
          done

  publish-latest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [e2e]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          tags: ghcr.io/cynkra/blockyard:latest

  coverage:
    runs-on: ubuntu-latest
    needs: [check, docker, idp, openbao]
    if: github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - uses: codecov/codecov-action@v5
        with:
          files: coverage-check.out,coverage-docker.out,coverage-idp.out,coverage-openbao.out
          flags: unit,docker,idp,openbao
          fail_ci_if_error: true
