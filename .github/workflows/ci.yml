name: CI

on:
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      job:
        description: "Run a single job (leave empty for all)"
        type: choice
        options:
          - ""
          - unit
          - cli
          - docker
          - idp
          - openbao
          - pak
          - process
          - ui
          - redis

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - id: check
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh api "repos/$GITHUB_REPOSITORY/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate -q '.[].filename' | grep -qvE '^docs/|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # Enforces the "Go code does not exec these tools" half of the
  # binutils-family package-level ignore in .trivyignore.rego. If any
  # of these binaries is legitimately needed from Go code, drop the
  # ignore to CVE-level first so the trust boundary is explicit.
  # Review-after dates are tracked via .github/workflows/review-reminders.yml
  # which opens a GitHub issue rather than blocking CI.
  exec-guard:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check no exec of tools whose CVEs are silenced
        run: |
          tools='readelf|objdump|ld|as|nm|strip|addr2line|ar|ranlib|gprof|size'
          # Catches both bare names and absolute paths:
          #   exec.Command("tool", ...)
          #   exec.Command("/usr/bin/tool", ...)
          #   exec.CommandContext(ctx, "tool", ...)
          pattern='exec\.Command\("(/[^"]*/)?('"$tools"')"|exec\.CommandContext\([^,]+, *"(/[^"]*/)?('"$tools"')"'
          if grep -rnE "$pattern" --include='*.go' .; then
            echo "::error::Go code invokes a binutils tool whose CVEs are silenced via package-level ignore in .trivyignore.rego. Drop the ignore to CVE-level, or remove the invocation."
            exit 1
          fi

  dependencies:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          retry-on-snapshot-warnings: true

  migration-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_lint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Install Atlas Community
        run: |
          curl -fsSL https://release.ariga.io/atlas/atlas-community-linux-amd64-v1.1.0 \
            -o /usr/local/bin/atlas
          curl -fsSL https://release.ariga.io/atlas/atlas-community-linux-amd64-v1.1.0.sha256 \
            -o /tmp/atlas.sha256
          echo "$(cat /tmp/atlas.sha256)  /usr/local/bin/atlas" | sha256sum -c -
          chmod +x /usr/local/bin/atlas
      - name: Lint SQLite migrations
        run: |
          atlas migrate lint \
            --dir "file://internal/db/migrations/sqlite?format=golang-migrate" \
            --dev-url "sqlite://dev?mode=memory" \
            --latest 1
      - name: Lint PostgreSQL migrations
        run: |
          atlas migrate lint \
            --dir "file://internal/db/migrations/postgres?format=golang-migrate" \
            --dev-url "postgres://blockyard:blockyard@localhost:5432/blockyard_lint?sslmode=disable" \
            --latest 1

  unit:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' && github.event_name != 'merge_group' && (inputs.job == '' || inputs.job == 'unit')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    env:
      BLOCKYARD_TEST_POSTGRES_URL: postgres://blockyard:blockyard@localhost:5432/blockyard_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
        with:
          # docs/themes/hugo-book submodule is required for the Hugo
          # build below, which produces the real internal/docs/dist
          # content that TestDocsServesHTML asserts against.
          submodules: true
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.4"
          extended: true
      # Replace the committed stub at internal/docs/dist/index.html
      # with a real Hugo build so TestDocsServesHTML exercises the
      # production embed. Mirrors the step in release.yml.
      - name: Build docs for embed
        run: cd docs && hugo --baseURL /docs/ --minify && rm -rf ../internal/docs/dist && cp -r public ../internal/docs/dist
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify Go version consistency
        run: |
          GO_MINOR=$(awk '/^go /{print $2}' go.mod | grep -oP '^\d+\.\d+')
          for f in docker/server.Dockerfile \
                   docker/server-process.Dockerfile \
                   docker/server-everything.Dockerfile \
                   .devcontainer/Dockerfile; do
            if ! grep -qP "golang:${GO_MINOR}|GO_VERSION=${GO_MINOR}" "$f"; then
              echo "::error file=$f::Go version mismatch — expected $GO_MINOR (from go.mod)" && exit 1
            fi
          done
      # libseccomp-dev is required by cmd/seccomp-compile (CGO via
      # libseccomp-golang). Without it both golangci-lint's typecheck
      # pass and `go test ./cmd/seccomp-compile/...` fail to compile.
      # The runtime blockyard binary stays CGO-disabled — only this
      # one tool needs the system library.
      - name: Install libseccomp-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libseccomp-dev
      - uses: golangci/golangci-lint-action@v9
      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      # -count=1 disables Go's test result cache. Without it, packages
      # whose import graph hasn't changed reuse cached coverage data
      # from previous CI runs — and that cached data has block
      # boundaries from the OLD source. With -coverpkg cross-package
      # instrumentation those stale entries get merged with fresh
      # entries from packages that did change, producing two block
      # sets for the same source file and a misleadingly low total.
      - run: go test -count=1 -coverprofile=coverage-unit.out -coverpkg=./internal/...,./cmd/by/... ./internal/... ./cmd/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1
      # Phase 3-8 variant build verification. Each minimal variant
      # compiles cmd/blockyard with a distinct tag set and runs the
      # registered-factory assertion (cmd/blockyard/build_tags_*_test.go)
      # to prove the backend map matches the variant. The dep-graph
      # test at internal/build/deps_test.go is already covered by the
      # default `go test ./...` above.
      - name: Verify minimal,docker_backend variant
        run: |
          go build -tags "minimal,docker_backend" -o /tmp/blockyard-docker ./cmd/blockyard
          go test -tags "minimal,docker_backend" ./cmd/blockyard
      - name: Verify minimal,process_backend variant
        run: |
          go build -tags "minimal,process_backend" -o /tmp/blockyard-process ./cmd/blockyard
          go test -tags "minimal,process_backend" ./cmd/blockyard

      # Seccomp profile drift: if moby's default.json has been
      # bumped but blockyard-outer.json wasn't regenerated, fail
      # noisily so the reviewer runs `make regen-seccomp`.
      - name: Verify seccomp profile sync
        run: make regen-seccomp-check

  cli:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'cli')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run CLI integration tests with coverage
        run: |
          export GOCOVERDIR=$(mktemp -d)
          go test -tags cli_test -count=1 ./cmd/by/...
          go tool covdata textfmt -i="$GOCOVERDIR" -o=coverage-cli.out
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-cli
          path: coverage-cli.out
          retention-days: 1

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'docker')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -count=1 -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/preflight/... ./internal/proxy/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  pak:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'pak')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -count=1 -v -tags pak_test -coverprofile=coverage-pak.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/server/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-pak
          path: coverage-pak.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  idp:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'idp')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
      - run: go test -count=1 -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./internal/...,./cmd/by/... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  openbao:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'openbao')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
      - run: go test -count=1 -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./internal/...,./cmd/by/... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  redis:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'redis')
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags redis_test -count=1 -coverprofile=coverage-redis.out -coverpkg=./internal/...,./cmd/by/... ./internal/redisstate/... ./internal/session/... ./internal/registry/... ./internal/server/...
        env:
          REDIS_TEST_ADDR: localhost:6379
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-redis
          path: coverage-redis.out
          retention-days: 1

  ui:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'ui')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -count=1 -tags ui_test -coverprofile=coverage-ui.out -coverpkg=./internal/...,./cmd/by/... ./internal/ui/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-ui
          path: coverage-ui.out
          retention-days: 1

  # The process backend supports three deployment modes (see
  # backends.md / phase-3-7.md decision #5). All three are tested
  # in parallel because the security-relevant preflight check
  # (checkBwrapHostUIDMapping) and the iptables --uid-owner contract
  # behave differently per mode and we want regressions in any
  # single mode to surface immediately.
  #
  #   - root        — sudo go test, blockyard-as-root containerized
  #                   mode. bwrap inherits CAP_SYS_ADMIN and writes
  #                   any uid_map.
  #   - setuid      — `chmod u+s /usr/bin/bwrap` then run unprivileged.
  #                   Matches the Fedora/RHEL production default and
  #                   the recommended path for native non-root
  #                   blockyard on Debian 12+/Ubuntu 24.04+.
  #   - unprivileged — disable Ubuntu 24.04's AppArmor restriction
  #                    on unprivileged user namespaces and run as
  #                    the runner user with no setuid. Workers can
  #                    spawn but uid_map writes to foreign UIDs are
  #                    rejected by the kernel — exactly the silent
  #                    failure mode the preflight check is supposed
  #                    to detect. The integration tests assert that
  #                    checkBwrapHostUIDMapping returns Error here.
  process:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'process')
    # Run inside the production worker image so TestRSmokeBoot
    # exercises R (/usr/local/bin/R) from the exact path blockyard.toml
    # points at. --privileged is required for the unprivileged matrix
    # leg to write kernel.apparmor_restrict_unprivileged_userns (a
    # non-namespaced sysctl that the kernel enforces for container
    # processes too). Tests still run as a non-root user for the
    # setuid/unprivileged modes, so the capability matrix is preserved
    # per-test.
    container:
      image: ghcr.io/cynkra/blockyard-worker:4.4.3
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        mode: [root, setuid, unprivileged]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install bubblewrap and create non-root user
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bubblewrap
          # Non-root user used by setuid and unprivileged modes.
          # root mode doesn't need it but creating it is cheap.
          useradd -m -u 2000 blockyard-runner
          # setup-go puts Go in /opt/hostedtoolcache owned by root.
          # The non-root user needs execute access on the Go binary;
          # GOCACHE/GOMODCACHE will go to the non-root user's $HOME.
          chmod -R a+rx /opt/hostedtoolcache/go || true
      - name: Configure mode (${{ matrix.mode }})
        run: |
          case "${{ matrix.mode }}" in
            root)
              : # nothing extra; test process runs as container root
              ;;
            setuid)
              chmod u+s /usr/bin/bwrap
              ;;
            unprivileged)
              # Disable the AppArmor restriction on unprivileged
              # userns creation so bwrap can CREATE the namespace;
              # the test still fails at uid_map write time (the
              # blockyard-runner user has no subuid range), which
              # is the silent-failure path the preflight check is
              # meant to detect.
              sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
              ;;
          esac
      - name: Run process backend tests (${{ matrix.mode }})
        # /github/home (the HOME Actions sets inside container jobs)
        # isn't writable as root in the worker container, so go's
        # default module cache path blows up. Point GOCACHE/GOMODCACHE
        # at /tmp which is always world-writable. Same override used
        # for root and non-root test runs so the paths are symmetric.
        env:
          GOCACHE: /tmp/gocache
          GOMODCACHE: /tmp/gomodcache
        run: |
          mkdir -p "$GOCACHE" "$GOMODCACHE"
          case "${{ matrix.mode }}" in
            root)
              go test -count=1 -tags process_test \
                -coverprofile=coverage-process-${{ matrix.mode }}.out \
                -coverpkg=./internal/... \
                ./internal/backend/process/... \
                ./internal/orchestrator/...
              ;;
            *)
              # Run as the non-root user. chown the workspace + cache
              # so go test can write coverage and cache artifacts.
              chown -R blockyard-runner:blockyard-runner "$PWD" "$GOCACHE" "$GOMODCACHE"
              # runuser -u preserves PATH so go and R are still found.
              runuser -u blockyard-runner -- env \
                PATH="$PATH" \
                GOCACHE="$GOCACHE" \
                GOMODCACHE="$GOMODCACHE" \
                go test -count=1 -tags process_test \
                -coverprofile=coverage-process-${{ matrix.mode }}.out \
                -coverpkg=./internal/... \
                ./internal/backend/process/... \
                ./internal/orchestrator/...
              ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-process-${{ matrix.mode }}
          path: coverage-process-${{ matrix.mode }}.out
          retention-days: 1

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'merge_group' && github.event_name != 'push' && inputs.job == ''
    needs: [unit, cli, docker, idp, openbao, pak, process, redis, ui]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Enforce 80% coverage threshold
        run: |
          head -1 coverage-unit.out > merged.out
          tail -n +2 -q coverage-*.out | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
