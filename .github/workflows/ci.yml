name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --features test-support
      - run: cargo llvm-cov --features test-support --lcov --output-path lcov-smoke.info
      - uses: actions/upload-artifact@v4
        with:
          name: lcov-smoke
          path: lcov-smoke.info

  integration:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: docker pull ghcr.io/rocker-org/r-ver:latest
      - run: docker pull alpine:latest
      - name: Block metadata endpoint for Docker containers
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP
      - run: cargo llvm-cov --features docker-tests --lcov --output-path lcov-integration.info
      - uses: actions/upload-artifact@v4
        with:
          name: lcov-integration
          path: lcov-integration.info

  coverage:
    needs: [smoke, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: lcov-*
          merge-multiple: true
      - uses: codecov/codecov-action@v5
        with:
          files: lcov-smoke.info,lcov-integration.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

