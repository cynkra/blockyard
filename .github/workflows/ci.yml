name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go vet ./...
      - run: go test -coverprofile=coverage-check.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-check
          path: coverage-check.out

  docker:
    runs-on: ubuntu-latest
    env:
      BLOCKYARD_DOCKER_BLOCK_CLOUD_METADATA: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: docker pull alpine:latest
      - run: go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./... ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-docker
          path: coverage-docker.out

  coverage:
    runs-on: ubuntu-latest
    needs: [check, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
      - uses: codecov/codecov-action@v5
        with:
          files: coverage-check.out,coverage-docker.out
          flags: unit,docker
          fail_ci_if_error: true
