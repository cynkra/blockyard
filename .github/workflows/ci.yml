name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      job:
        description: "Run a single job (leave empty for all)"
        type: choice
        options:
          - ""
          - check
          - docker
          - idp
          - openbao
          - ui

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name != 'merge_group' && (inputs.job == '' || inputs.job == 'check')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    env:
      BLOCKYARD_TEST_POSTGRES_URL: postgres://blockyard:blockyard@localhost:5432/blockyard_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify Go version consistency
        run: |
          GO_MINOR=$(awk '/^go /{print $2}' go.mod | grep -oP '^\d+\.\d+')
          for f in docker/server.Dockerfile .devcontainer/Dockerfile; do
            if ! grep -qP "golang:${GO_MINOR}|GO_VERSION=${GO_MINOR}" "$f"; then
              echo "::error file=$f::Go version mismatch — expected $GO_MINOR (from go.mod)" && exit 1
            fi
          done
      - uses: golangci/golangci-lint-action@v7
      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go test -coverprofile=coverage-check.out ./internal/...
      - name: Run CLI tests (unit + integration)
        run: go test -tags cli_test -count=1 ./cmd/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-check
          path: coverage-check.out

  docker:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'docker')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker pull alpine:latest && docker pull ghcr.io/rocker-org/r-ver:latest && docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - run: sudo --preserve-env=PATH go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./internal/... ./internal/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out

  idp:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'idp')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull quay.io/keycloak/keycloak:26.0
      - run: go test -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./internal/... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out

  openbao:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'openbao')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: docker pull ghcr.io/openbao/openbao:latest
      - run: go test -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./internal/... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out

  ui:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'ui')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags ui_test -coverprofile=coverage-ui.out -coverpkg=./internal/... ./internal/ui/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-ui
          path: coverage-ui.out

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group' && github.event_name != 'push' && inputs.job == ''
    needs: [check, docker, idp, openbao, ui]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Enforce 80% coverage threshold
        run: |
          head -1 coverage-check.out > merged.out
          tail -n +2 -q coverage-*.out | sort -u >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage-check.out,coverage-docker.out,coverage-idp.out,coverage-openbao.out,coverage-ui.out
          flags: unit,docker,idp,openbao,ui
          fail_ci_if_error: false
