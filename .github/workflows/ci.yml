name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      job:
        description: "Run a single job (leave empty for all)"
        type: choice
        options:
          - ""
          - unit
          - cli
          - docker
          - idp
          - openbao
          - pak
          - ui
          - redis

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - id: check
        run: |
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh api "repos/$GITHUB_REPOSITORY/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate -q '.[].filename' | grep -qvE '^docs/|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  dependencies:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          retry-on-snapshot-warnings: true

  migration-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_lint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Install Atlas Community
        run: |
          curl -fsSL https://release.ariga.io/atlas/atlas-community-linux-amd64-v1.1.0 \
            -o /usr/local/bin/atlas
          curl -fsSL https://release.ariga.io/atlas/atlas-community-linux-amd64-v1.1.0.sha256 \
            -o /tmp/atlas.sha256
          echo "$(cat /tmp/atlas.sha256)  /usr/local/bin/atlas" | sha256sum -c -
          chmod +x /usr/local/bin/atlas
      - name: Lint SQLite migrations
        run: |
          atlas migrate lint \
            --dir "file://internal/db/migrations/sqlite?format=golang-migrate" \
            --dev-url "sqlite://dev?mode=memory" \
            --latest 1
      - name: Lint PostgreSQL migrations
        run: |
          atlas migrate lint \
            --dir "file://internal/db/migrations/postgres?format=golang-migrate" \
            --dev-url "postgres://blockyard:blockyard@localhost:5432/blockyard_lint?sslmode=disable" \
            --latest 1

  unit:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' && github.event_name != 'merge_group' && (inputs.job == '' || inputs.job == 'unit')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: blockyard
          POSTGRES_PASSWORD: blockyard
          POSTGRES_DB: blockyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blockyard"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
    env:
      BLOCKYARD_TEST_POSTGRES_URL: postgres://blockyard:blockyard@localhost:5432/blockyard_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify Go version consistency
        run: |
          GO_MINOR=$(awk '/^go /{print $2}' go.mod | grep -oP '^\d+\.\d+')
          for f in docker/server.Dockerfile .devcontainer/Dockerfile; do
            if ! grep -qP "golang:${GO_MINOR}|GO_VERSION=${GO_MINOR}" "$f"; then
              echo "::error file=$f::Go version mismatch — expected $GO_MINOR (from go.mod)" && exit 1
            fi
          done
      - uses: golangci/golangci-lint-action@v9
      - name: Check for known vulnerabilities
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go test -coverprofile=coverage-unit.out -coverpkg=./internal/...,./cmd/by/... ./internal/... ./cmd/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1

  cli:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'cli')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run CLI integration tests with coverage
        run: |
          export GOCOVERDIR=$(mktemp -d)
          go test -tags cli_test -count=1 ./cmd/by/...
          go tool covdata textfmt -i="$GOCOVERDIR" -o=coverage-cli.out
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-cli
          path: coverage-cli.out
          retention-days: 1

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'docker')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -tags docker_test -coverprofile=coverage-docker.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/preflight/... ./internal/proxy/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-docker
          path: coverage-docker.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  pak:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'pak')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: sudo GOCACHE=$(go env GOCACHE) GOMODCACHE=$(go env GOMODCACHE) go test -v -tags pak_test -coverprofile=coverage-pak.out -coverpkg=./internal/...,./cmd/by/... ./internal/backend/docker/... ./internal/server/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-pak
          path: coverage-pak.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  idp:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'idp')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
      - run: go test -tags idp_test -coverprofile=coverage-idp.out -coverpkg=./internal/...,./cmd/by/... ./internal/auth/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-idp
          path: coverage-idp.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  openbao:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'openbao')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        with:
          phase: setup
      - run: go test -tags openbao_test -coverprofile=coverage-openbao.out -coverpkg=./internal/...,./cmd/by/... ./internal/integration/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-openbao
          path: coverage-openbao.out
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always()
        with:
          phase: save

  redis:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'redis')
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags redis_test -count=1 -coverprofile=coverage-redis.out -coverpkg=./internal/...,./cmd/by/... ./internal/redisstate/... ./internal/session/... ./internal/registry/... ./internal/server/...
        env:
          REDIS_TEST_ADDR: localhost:6379
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-redis
          path: coverage-redis.out
          retention-days: 1

  ui:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [unit]
    if: github.event_name != 'merge_group' && github.event_name != 'push' && (inputs.job == '' || inputs.job == 'ui')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags ui_test -coverprofile=coverage-ui.out -coverpkg=./internal/...,./cmd/by/... ./internal/ui/...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-ui
          path: coverage-ui.out
          retention-days: 1

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'merge_group' && github.event_name != 'push' && inputs.job == ''
    needs: [unit, cli, docker, idp, openbao, pak, redis, ui]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Enforce 80% coverage threshold
        run: |
          head -1 coverage-unit.out > merged.out
          tail -n +2 -q coverage-*.out | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 80% threshold"
            exit 1
          fi
