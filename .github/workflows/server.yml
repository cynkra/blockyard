name: Server Image

on:
  workflow_call:
    inputs:
      version:
        type: string
        default: ""

env:
  IMAGE: ghcr.io/cynkra/blockyard

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # docker variant: blockyard-docker:<v>
          - variant: docker
            dockerfile: docker/server.Dockerfile
            image_suffix: -docker
            runner: ubuntu-24.04
            platform: linux/amd64
          - variant: docker
            dockerfile: docker/server.Dockerfile
            image_suffix: -docker
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # process variant: blockyard-process:<v>
          - variant: process
            dockerfile: docker/server-process.Dockerfile
            image_suffix: -process
            runner: ubuntu-24.04
            platform: linux/amd64
          - variant: process
            dockerfile: docker/server-process.Dockerfile
            image_suffix: -process
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # everything variant: blockyard:<v> (default :latest)
          - variant: everything
            dockerfile: docker/server-everything.Dockerfile
            image_suffix: ""
            runner: ubuntu-24.04
            platform: linux/amd64
          - variant: everything
            dockerfile: docker/server-everything.Dockerfile
            image_suffix: ""
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # docs/themes/hugo-book is a submodule; docker/server.Dockerfile's
          # Hugo stage needs it to produce real docs output. Without this,
          # the image silently ships near-empty pages under /docs/.
          submodules: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: slug
        run: echo "platform=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - id: version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then
            V="$(git describe --always --dirty)"
          elif [ "$V" = "main" ]; then
            V="$(git describe --always --dirty)"
          else
            V="${V#v}"
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: ${{ env.IMAGE }}${{ matrix.image_suffix }}:build-${{ steps.slug.outputs.platform }}
          push: true
