name: Worker Image

on:
  workflow_call:

env:
  IMAGE: ghcr.io/cynkra/blockyard-worker

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # One image per R version. Operators on R outside this set
        # extend a near-version image (FROM ... + rig add) or bring
        # their own. Refresh the patch versions when new R releases
        # land — the weekly cron rebuild then picks them up.
        r_version: ["4.5.0", "4.4.3", "4.3.3", "4.2.3", "4.1.3"]
        arch:
          - { runner: ubuntu-24.04, platform: linux/amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64 }
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - id: slug
        run: echo "platform=$(echo '${{ matrix.arch.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/worker.Dockerfile
          platforms: ${{ matrix.arch.platform }}
          build-args: |
            R_VERSION=${{ matrix.r_version }}
          tags: ${{ env.IMAGE }}:${{ matrix.r_version }}-build-${{ steps.slug.outputs.platform }}
          push: true
