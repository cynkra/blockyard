name: Merge

on:
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      test:
        description: "Run a single example test (leave empty for all)"
        type: choice
        options:
          - ""
          - TestHelloShiny
          - TestHelloPocketbase
          - TestHelloPostgrest

permissions:
  contents: read

jobs:
  run:
    name: ${{ matrix.example }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(
          inputs.test == 'TestHelloShiny'       && '[{"example":"hello-shiny","test":"TestHelloShiny"}]' ||
          inputs.test == 'TestHelloPocketbase'  && '[{"example":"hello-pocketbase","test":"TestHelloPocketbase"}]' ||
          inputs.test == 'TestHelloPostgrest'   && '[{"example":"hello-postgrest","test":"TestHelloPostgrest"}]' ||
          '[{"example":"hello-shiny","test":"TestHelloShiny"},{"example":"hello-pocketbase","test":"TestHelloPocketbase"},{"example":"hello-postgrest","test":"TestHelloPostgrest"}]'
          ) }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request'
      - uses: actions/setup-go@v6
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        if: github.event_name != 'pull_request'
        with:
          phase: setup
          key: ${{ matrix.test }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull compose images
        if: github.event_name == 'push'
        run: docker compose -f examples/${{ matrix.example }}/docker-compose.yml pull --ignore-pull-failures
      - name: Build blockyard image from source
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: docker build -t ghcr.io/cynkra/blockyard:latest -t ghcr.io/cynkra/blockyard:main --build-arg COVER=1 --build-arg "VERSION=$(git describe --always --dirty)" -f docker/server.Dockerfile .
      - name: Block cloud metadata endpoint for containers
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || true
      - name: Prepare coverage directory
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: mkdir -p /tmp/e2e-coverage/{cli,server}
      - name: Run example tests
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: sudo --preserve-env=PATH,E2E_GOCOVERDIR go test -v -tags examples -run ${{ matrix.test }} -timeout 20m ./tests/examples/...
        env:
          E2E_GOCOVERDIR: /tmp/e2e-coverage
      - name: Convert example coverage data
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: |
          for sub in cli server; do
            dir="/tmp/e2e-coverage/$sub"
            if [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
              go tool covdata textfmt -i="$dir" -o="coverage-examples-${sub}-${{ matrix.test }}.out"
            fi
          done
      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        with:
          name: coverage-examples-${{ matrix.test }}
          path: coverage-examples-*.out
          if-no-files-found: ignore
          retention-days: 1
      - uses: ./.github/actions/docker-cache
        if: always() && github.event_name != 'pull_request'
        with:
          phase: save
          key: ${{ matrix.test }}
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" logs --no-color 2>/dev/null || true
          # Workers are spawned by blockyard outside docker-compose,
          # so their stdout/stderr isn't in the compose logs above.
          # Dump them by label so we can see R/Shiny startup failures.
          workers=$(docker ps -a --filter 'label=dev.blockyard/role=worker' --format '{{.ID}} {{.Names}}')
          if [ -n "$workers" ]; then
            echo "==> blockyard worker containers"
            echo "$workers"
            while IFS= read -r line; do
              id=${line%% *}
              name=${line#* }
              echo "==> worker $name ($id) logs"
              docker logs "$id" 2>&1 || true
              echo
            done <<< "$workers"
          else
            echo "==> no blockyard worker containers found"
          fi
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" down -v --remove-orphans 2>/dev/null || true

  e2e:
    name: e2e
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request'
      - uses: actions/setup-node@v6
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        with:
          node-version: 22
      - uses: ./.github/actions/docker-cache
        if: github.event_name != 'pull_request'
        with:
          phase: setup
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull compose images
        if: github.event_name == 'push'
        run: docker compose -f examples/hello-shiny/docker-compose.yml pull --ignore-pull-failures
      - name: Build blockyard image from source
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: docker build -t ghcr.io/cynkra/blockyard:latest -t ghcr.io/cynkra/blockyard:main --build-arg COVER=1 --build-arg "VERSION=$(git describe --always --dirty)" -f docker/server.Dockerfile .
      - name: Block cloud metadata endpoint
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || true
      - name: Prepare coverage directory
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: mkdir -p /tmp/playwright-coverage
      - name: Start services
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: |
          E2E_GOCOVERDIR=/tmp/playwright-coverage \
          docker compose -f examples/hello-shiny/docker-compose.yml \
                         -f tests/examples/docker-compose.cover.yml \
                         up -d --wait
      - uses: actions/setup-go@v6
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        with:
          go-version-file: go.mod
      - name: Build CLI and deploy hello app
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        run: |
          go build -o /tmp/by ./cmd/by

          # Automated OIDC login to obtain a PAT (same flow as deploy.sh).
          COOKIE_JAR=$(mktemp)
          LOGIN_PAGE=$(curl -sS -L -c "$COOKIE_JAR" -b "$COOKIE_JAR" -w '\n%{url_effective}' http://localhost:8080/login)
          FORM_ACTION=$(echo "$LOGIN_PAGE" | sed '$d' | grep -o 'action="[^"]*"' | head -1 | cut -d'"' -f2 | sed 's/&amp;/\&/g')
          [[ "$FORM_ACTION" == /* ]] && FORM_ACTION="http://localhost:5556${FORM_ACTION}"
          curl -sS -L -c "$COOKIE_JAR" -b "$COOKIE_JAR" -d "login=demo@example.com&password=password" "$FORM_ACTION" > /dev/null
          TOKEN=$(curl -sS -b "$COOKIE_JAR" -X POST -H "Content-Type: application/json" \
            -d '{"name":"playwright-ci","expires_in":"1h"}' \
            http://localhost:8080/api/v1/users/me/tokens | grep -o '"token":"[^"]*' | cut -d'"' -f4)
          rm -f "$COOKIE_JAR"

          BLOCKYARD_URL=http://localhost:8080 BLOCKYARD_TOKEN="$TOKEN" \
            /tmp/by deploy examples/hello-shiny/app --yes --wait --name hello
      - name: Install Playwright
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        if: github.event_name != 'pull_request' && github.event_name != 'push'
        working-directory: tests/e2e
        run: npx playwright test
      - name: Stop services and flush coverage
        if: always() && github.event_name != 'pull_request' && github.event_name != 'push'
        run: docker compose -f examples/hello-shiny/docker-compose.yml stop blockyard
      - name: Convert coverage data
        if: always() && github.event_name != 'pull_request' && github.event_name != 'push'
        run: |
          dir="/tmp/playwright-coverage"
          if [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
            go tool covdata textfmt -i="$dir" -o="coverage-e2e.out"
          fi
      - uses: actions/upload-artifact@v7
        if: always() && github.event_name != 'pull_request' && github.event_name != 'push'
        with:
          name: coverage-e2e
          path: coverage-e2e-*.out
          if-no-files-found: ignore
          retention-days: 1
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
      - uses: ./.github/actions/docker-cache
        if: always() && github.event_name != 'pull_request'
        with:
          phase: save
      - name: Dump compose logs on failure
        if: failure() && github.event_name != 'pull_request'
        run: |
          docker compose -f examples/hello-shiny/docker-compose.yml logs --no-color 2>/dev/null || true
          docker compose -f examples/hello-shiny/docker-compose.yml down -v --remove-orphans 2>/dev/null || true

  examples:
    if: always() && github.event_name != 'push'
    needs: [run]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - if: needs.run.result != 'success'
        run: |
          echo "::error::Example tests failed (run: ${{ needs.run.result }})"
          exit 1
      - run: echo "All example tests passed."

  coverage:
    if: github.event_name == 'merge_group'
    needs: [run, e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Download CI coverage artifacts from the PR's ci.yml run.
      - name: Extract PR number from merge group ref
        id: pr
        run: |
          REF="${{ github.event.merge_group.head_ref }}"
          PR_NUM=$(echo "$REF" | grep -oP 'pr-\K[0-9]+')
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - uses: dawidd6/action-download-artifact@v20
        with:
          workflow: ci.yml
          pr: ${{ steps.pr.outputs.number }}
          name: coverage-.*
          name_is_regexp: true
          path: ci-coverage
          if_no_artifact_found: warn

      # Flatten CI artifacts (each downloads into its own subdirectory).
      - name: Flatten CI coverage files
        run: |
          if [ -d ci-coverage ]; then
            find ci-coverage -name '*.out' -exec mv {} . \;
            rm -rf ci-coverage
          fi

      # Download test coverage artifacts from this workflow.
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true

      # Aggregate per-matrix example files into a single coverage-examples.out.
      - name: Aggregate example coverage
        run: |
          files=$(ls coverage-examples-*.out 2>/dev/null || true)
          [ -z "$files" ] && exit 0
          head -1 $(echo "$files" | head -1) > coverage-examples.out
          tail -n +2 -q $files | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> coverage-examples.out
          rm -f $files

      - name: List coverage files
        run: ls -la coverage-*.out 2>/dev/null || echo "No coverage files found"

      # Merge all profiles and print total.
      - name: Merge coverage profiles
        run: |
          if ! ls coverage-*.out >/dev/null 2>&1; then
            echo "::warning::No coverage files found"
            exit 0
          fi
          head -1 "$(ls coverage-*.out | head -1)" > merged.out
          tail -n +2 -q coverage-*.out | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage (CI + e2e): ${TOTAL}%"

      # Upload each coverage file with its own flag for per-suite
      # filtering on Codecov.
      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -fsSL https://cli.codecov.io/latest/linux/codecov -o ./codecov
          curl -fsSL https://cli.codecov.io/latest/linux/codecov.SHA256SUM -o ./codecov.SHA256SUM
          sha256sum -c codecov.SHA256SUM
          chmod +x ./codecov
          for f in coverage-*.out; do
            [ -f "$f" ] || continue
            flag="${f%.out}"
            flag="${flag#coverage-}"
            echo "Uploading $f with flag=$flag"
            ./codecov upload-process -t "$CODECOV_TOKEN" -F "$flag" -f "$f" \
              --disable-search -n "merge-${flag}" || true
          done
