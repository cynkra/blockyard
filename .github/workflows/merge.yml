name: Merge

on:
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:
    inputs:
      test:
        description: "Run a single example test (leave empty for all)"
        type: choice
        options:
          - ""
          - TestHelloShiny
          - TestHelloShinyUI
          - TestHelloPocketbase
          - TestHelloPostgrest

permissions:
  contents: read

jobs:
  run:
    name: ${{ matrix.example }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(
          inputs.test == 'TestHelloShiny'            && '[{"example":"hello-shiny","test":"TestHelloShiny"}]' ||
          inputs.test == 'TestHelloShinyUI'     && '[{"example":"hello-shiny","test":"TestHelloShinyUI"}]' ||
          inputs.test == 'TestHelloPocketbase'  && '[{"example":"hello-pocketbase","test":"TestHelloPocketbase"}]' ||
          inputs.test == 'TestHelloPostgrest'   && '[{"example":"hello-postgrest","test":"TestHelloPostgrest"}]' ||
          '[{"example":"hello-shiny","test":"TestHelloShiny"},{"example":"hello-pocketbase","test":"TestHelloPocketbase"},{"example":"hello-postgrest","test":"TestHelloPostgrest"}]'
          ) }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'pull_request'
      - uses: actions/setup-go@v6
        if: github.event_name != 'pull_request'
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/docker-cache
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          images: >
            alpine:3.23
            curlimages/curl:latest
            dexidp/dex:v2.41.1
            golang:1.25.8-bookworm
            postgres:17
            postgrest/postgrest:v12.2.3
      - name: Build blockyard image from source
        if: github.event_name != 'pull_request'
        run: docker build -t ghcr.io/cynkra/blockyard:latest -t ghcr.io/cynkra/blockyard:main --build-arg COVER=1 -f docker/server.Dockerfile .
      - name: Pull GHCR images used by examples
        if: github.event_name != 'pull_request'
        run: |
          docker pull ghcr.io/openbao/openbao:2.5.2
          docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - name: Block cloud metadata endpoint for containers
        if: github.event_name != 'pull_request'
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || true
      - name: Prepare coverage directory
        if: github.event_name != 'pull_request'
        run: mkdir -p /tmp/e2e-coverage/{cli,server}
      - name: Run example tests
        if: github.event_name != 'pull_request'
        run: sudo --preserve-env=PATH,E2E_GOCOVERDIR,E2E_PULL_POLICY go test -v -tags ex -run ${{ matrix.test }} -timeout 20m ./ex/...
        env:
          E2E_GOCOVERDIR: /tmp/e2e-coverage
          E2E_PULL_POLICY: never
      - name: Convert example coverage data
        if: github.event_name != 'pull_request'
        run: |
          for sub in cli server; do
            dir="/tmp/e2e-coverage/$sub"
            if [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
              go tool covdata textfmt -i="$dir" -o="coverage-ex-${sub}-${{ matrix.test }}.out"
            fi
          done
      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: coverage-ex-${{ matrix.test }}
          path: coverage-ex-*.out
          if-no-files-found: ignore
          retention-days: 1
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" logs --no-color 2>/dev/null || true
          docker compose -f "examples/${{ matrix.example }}/docker-compose.yml" down -v --remove-orphans 2>/dev/null || true

  playwright:
    name: Playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.github/actions/docker-cache
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          images: >
            dexidp/dex:v2.41.1
            alpine:3.23
            golang:1.25.8-bookworm
      - name: Build blockyard image from source
        run: docker build -t ghcr.io/cynkra/blockyard:latest -f docker/server.Dockerfile .
      - name: Pull GHCR images
        run: docker pull ghcr.io/rocker-org/r-ver:4.4.3
      - name: Block cloud metadata endpoint
        run: sudo iptables -I DOCKER-USER -d 169.254.169.254/32 -j DROP 2>/dev/null || true
      - name: Start services
        run: docker compose -f examples/hello-shiny/docker-compose.yml up -d --wait
      - name: Deploy hello app
        run: bash examples/hello-shiny/deploy.sh
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f examples/hello-shiny/docker-compose.yml logs --no-color 2>/dev/null || true
          docker compose -f examples/hello-shiny/docker-compose.yml down -v --remove-orphans 2>/dev/null || true

  e2e:
    if: always()
    needs: [run, playwright]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - if: needs.run.result != 'success' || needs.playwright.result != 'success'
        run: |
          echo "::error::Tests failed (run: ${{ needs.run.result }}, playwright: ${{ needs.playwright.result }})"
          exit 1
      - run: echo "All tests passed."

  coverage:
    if: github.event_name == 'merge_group'
    needs: [run]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Download CI coverage artifacts from the PR's ci.yml run.
      - name: Extract PR number from merge group ref
        id: pr
        run: |
          REF="${{ github.event.merge_group.head_ref }}"
          PR_NUM=$(echo "$REF" | grep -oP 'pr-\K[0-9]+')
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"

      - uses: dawidd6/action-download-artifact@v8
        with:
          workflow: ci.yml
          pr: ${{ steps.pr.outputs.number }}
          name: coverage-.*
          name_is_regexp: true
          path: ci-coverage
          if_no_artifact_found: warn

      # Flatten CI artifacts (each downloads into its own subdirectory).
      - name: Flatten CI coverage files
        run: |
          if [ -d ci-coverage ]; then
            find ci-coverage -name '*.out' -exec mv {} . \;
            rm -rf ci-coverage
          fi

      # Download e2e coverage artifacts from this workflow.
      - uses: actions/download-artifact@v8
        with:
          pattern: coverage-ex-*
          merge-multiple: true

      # Aggregate all per-test e2e files into a single coverage-e2e.out.
      - name: Aggregate example coverage
        run: |
          files=$(ls coverage-ex-*.out 2>/dev/null || true)
          [ -z "$files" ] && exit 0
          head -1 $(echo "$files" | head -1) > coverage-ex.out
          tail -n +2 -q $files | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> coverage-ex.out
          rm -f $files

      - name: List coverage files
        run: ls -la coverage-*.out 2>/dev/null || echo "No coverage files found"

      # Merge all profiles and print total.
      - name: Merge coverage profiles
        run: |
          if ! ls coverage-*.out >/dev/null 2>&1; then
            echo "::warning::No coverage files found"
            exit 0
          fi
          head -1 "$(ls coverage-*.out | head -1)" > merged.out
          tail -n +2 -q coverage-*.out | sort -k1,2 -k3,3rn | awk '{k=$1" "$2} !seen[k]++' >> merged.out
          TOTAL=$(go tool cover -func=merged.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage (CI + e2e): ${TOTAL}%"

      # Upload each coverage file with its own flag for per-suite
      # filtering on Codecov.
      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -fsSL https://cli.codecov.io/latest/linux/codecov -o ./codecov
          curl -fsSL https://cli.codecov.io/latest/linux/codecov.SHA256SUM -o ./codecov.SHA256SUM
          sha256sum -c codecov.SHA256SUM
          chmod +x ./codecov
          for f in coverage-*.out; do
            [ -f "$f" ] || continue
            flag="${f%.out}"
            flag="${flag#coverage-}"
            echo "Uploading $f with flag=$flag"
            ./codecov upload-process -t "$CODECOV_TOKEN" -F "$flag" -f "$f" \
              --disable-search -n "merge-${flag}" || true
          done
