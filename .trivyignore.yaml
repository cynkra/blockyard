# Trivy ignore rules for blockyard container images.
#
# Format: https://trivy.dev/latest/docs/configuration/filtering/
#
# Every entry MUST include a statement explaining why the CVE is being
# suppressed. Prefer narrow CVE-ID ignores (this file) over blanket
# severity filters — the scan workflow still uses severity: CRITICAL,HIGH
# so anything not listed here will still fire.

vulnerabilities:
  # linux-libc-dev ships kernel header files (/usr/include/linux/*,
  # /usr/include/asm/*) as a transitive dep of libc6-dev -> g++ in the
  # rocker/r-ver:4.4.3 base image used by server-everything and
  # server-process.
  #
  # The CVEs listed below describe running-kernel vulnerabilities.
  # Containers do not run a kernel built from these headers — they use
  # the host kernel — so the CVEs are not exploitable inside the image.
  #
  # We intentionally keep the package because purging it would cascade
  # into libc6-dev/g++/gfortran removal and break R package source
  # compilation, which users of the process backend rely on.
  #
  # Revisit on each rocker base bump: newer kernel header versions will
  # publish new CVE IDs. Add entries below (and delete obsolete ones)
  # when that happens. The whole category becomes moot once #185 lands
  # and we migrate off rocker to a minimal R base image.
  - id: CVE-2026-23411
    statement: linux-libc-dev kernel CVE; container uses host kernel, not applicable.
  - id: CVE-2026-23410
    statement: linux-libc-dev kernel CVE; container uses host kernel, not applicable.
  - id: CVE-2026-23268
    statement: linux-libc-dev kernel CVE; container uses host kernel, not applicable.
  - id: CVE-2026-23112
    statement: linux-libc-dev kernel CVE; container uses host kernel, not applicable.
  - id: CVE-2026-23111
    statement: linux-libc-dev kernel CVE; container uses host kernel, not applicable.
