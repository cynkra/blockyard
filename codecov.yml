coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  unit:
    carryforward: true
  cli:
    carryforward: true
  docker:
    carryforward: true
  idp:
    carryforward: true
  openbao:
    carryforward: true
  pak:
    carryforward: true
  redis:
    carryforward: true
  ui:
    carryforward: true
  process-root:
    carryforward: true
  process-setuid:
    carryforward: true
  process-unprivileged:
    carryforward: true
  examples:
    carryforward: true
  e2e:
    carryforward: true

ignore:
  - "internal/testutil/**"          # test helpers only
  - "internal/preflight/docker_checks.go"  # moved to internal/backend/docker/preflight.go in 207dd28; carryforward keeps the ghost report alive

# Components mirror the commit-message scopes in AGENTS.md so coverage
# attribution follows the same mental model as commits. Paths not
# covered by any component (internal/config, internal/appname,
# cmd/coverage-check) still count in the repo total.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        informational: true
  individual_components:
    - component_id: proxy
      name: proxy
      paths:
        - internal/api/**
        - internal/proxy/**
        - internal/server/**
        - internal/ops/**
    - component_id: ui
      name: ui
      paths:
        - internal/ui/**
        - internal/docs/**
    - component_id: auth
      name: auth
      paths:
        - internal/auth/**
        - internal/authz/**
        - internal/session/**
        - internal/audit/**
        - internal/integration/**
    - component_id: cli
      name: cli
      paths:
        - cmd/by/**
        - cmd/by-builder/**
        - internal/apiclient/**
        - internal/cliconfig/**
        - internal/deploy/**
        - internal/update/**
    - component_id: db
      name: db
      paths:
        - internal/db/**
        - internal/registry/**
        - internal/redisstate/**
        - internal/boardstorage/**
        - internal/logstore/**
    - component_id: docker
      name: docker
      paths:
        - internal/backend/docker/**
    - component_id: process
      name: process
      paths:
        - cmd/blockyard/**
        - cmd/seccomp-compile/**
        - cmd/seccomp-merge/**
        - internal/backend/process/**
        - internal/build/**
        - internal/buildercache/**
        - internal/bundle/**
        - internal/detect/**
        - internal/drain/**
        - internal/manifest/**
        - internal/mount/**
        - internal/orchestrator/**
        - internal/pakcache/**
        - internal/pkgstore/**
        - internal/preflight/**
        - internal/seccomp/**
        - internal/task/**
        - internal/units/**
    - component_id: telemetry
      name: telemetry
      paths:
        - internal/telemetry/**
        - internal/errorlog/**
