      - apps
  /apps/{id}/sessions:
    get:
      description: List sessions for an app. Supports filtering by user and status.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Filter by user sub
        in: query
        name: user
        type: string
      - description: Filter by status (active, ended)
        in: query
        name: status
        type: string
