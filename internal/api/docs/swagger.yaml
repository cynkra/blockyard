            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
