      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cynkra_blockyard_internal_db.UserRow'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
