  github_com_cynkra_blockyard_internal_db.SessionRow:
    properties:
      app_id:
        type: string
      ended_at:
        type: string
      id:
        type: string
      started_at:
        type: string
      status:
        type: string
      user_sub:
        type: string
      worker_id:
        type: string
