  github_com_cynkra_blockyard_internal_db.DeploymentRow:
    properties:
      app_id:
        type: string
      app_name:
        type: string
      bundle_id:
        type: string
      deployed_at:
        type: string
      deployed_by:
        type: string
      deployed_by_name:
        type: string
      status:
        type: string
