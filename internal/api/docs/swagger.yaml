basePath: /api/v1
definitions:
  github_com_cynkra_blockyard_internal_db.BundleRow:
    properties:
      app_id:
        type: string
      deployed_at:
        type: string
      deployed_by:
        type: string
      id:
        type: string
      pinned:
        type: boolean
      status:
        type: string
      uploaded_at:
        type: string
