          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Revoke token
      tags:
      - tokens
securityDefinitions:
  BearerAuth:
    description: 'Personal access token (PAT). Format: "Bearer by_..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
