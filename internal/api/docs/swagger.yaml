  github_com_cynkra_blockyard_internal_db.UserRow:
    properties:
      active:
        type: boolean
      email:
        type: string
      last_login:
        type: string
      name:
        type: string
      role:
        type: string
      sub:
        type: string
    type: object
  internal_api.AppResponse:
    properties:
      access_type:
        type: string
      active_bundle:
        type: string
      cpu_limit:
        type: number
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: string
      max_sessions_per_worker:
        type: integer
      max_workers_per_app:
        type: integer
      memory_limit:
        type: string
      name:
        type: string
      owner:
        type: string
      pre_warmed_sessions:
        type: integer
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      workers:
        items:
          type: string
        type: array
    type: object
  internal_api.accessGrantResponse:
    properties:
      granted_at:
        type: string
      granted_by:
        type: string
      kind:
        type: string
      principal:
        type: string
      role:
        type: string
    type: object
  internal_api.addAppTagRequest:
    properties:
      tag_id:
        type: string
    type: object
  internal_api.appListItem:
    properties:
      access_type:
        type: string
      active_bundle:
        type: string
      created_at:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      name:
        type: string
      owner:
        type: string
      relation:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
    type: object
  internal_api.appListResponse:
    properties:
      apps:
        items:
          $ref: '#/definitions/internal_api.appListItem'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  internal_api.appResponseV2JSON:
    properties:
      access_type:
        type: string
      active_bundle:
        type: string
      cpu_limit:
        type: number
      created_at:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      max_sessions_per_worker:
        type: integer
      max_workers_per_app:
        type: integer
      memory_limit:
        type: string
      name:
        type: string
      owner:
        type: string
      pre_warmed_sessions:
        type: integer
      refresh_schedule:
        type: string
      relation:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
    type: object
  internal_api.appTagListResponse:
    properties:
      tags:
        items:
          $ref: '#/definitions/internal_api.tagResponse'
        type: array
    type: object
  internal_api.asyncTaskResponse:
    properties:
      message:
        type: string
      task_id:
        type: string
    type: object
  internal_api.bundleListResponse:
    properties:
      bundles:
        items:
          $ref: '#/definitions/github_com_cynkra_blockyard_internal_db.BundleRow'
        type: array
    type: object
  internal_api.catalogItem:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner:
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  internal_api.catalogResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_api.catalogItem'
        type: array
      page:
        type: integer
      per_page:
        example: 20
        type: integer
      total:
        type: integer
    type: object
  internal_api.createAppRequest:
    properties:
      name:
        type: string
    type: object
  internal_api.createTagRequest:
    properties:
      name:
        type: string
    type: object
  internal_api.createTokenRequest:
    properties:
      expires_in:
        description: e.g. "90d"
        type: string
      name:
        type: string
    type: object
  internal_api.createTokenResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  internal_api.currentUserResponse:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        type: string
      sub:
        type: string
    type: object
  internal_api.deploymentsResponse:
    properties:
      deployments:
        items:
          $ref: '#/definitions/github_com_cynkra_blockyard_internal_db.DeploymentRow'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  internal_api.errorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  internal_api.grantRequest:
    properties:
      kind:
        description: '"user"'
        type: string
      principal:
        type: string
      role:
        description: '"viewer" | "collaborator"'
        type: string
    type: object
  internal_api.rollbackRequest:
    properties:
      bundle_id:
        type: string
    type: object
  internal_api.runtimeResponse:
    properties:
      active_sessions:
        type: integer
      last_deployed_at:
        type: string
      recent_views:
        type: integer
      total_views:
        type: integer
      unique_visitors:
        type: integer
      workers:
        items:
          $ref: '#/definitions/internal_api.runtimeWorker'
        type: array
    type: object
  internal_api.runtimeSession:
    properties:
      id:
        type: string
      started_at:
        type: string
      user_display_name:
        type: string
      user_sub:
        type: string
    type: object
  internal_api.runtimeWorker:
    properties:
      bundle_id:
        type: string
      ended_at:
        type: string
      id:
        type: string
      idle_since:
        type: string
      sessions:
        items:
          $ref: '#/definitions/internal_api.runtimeSession'
        type: array
      started_at:
        type: string
      stats:
        $ref: '#/definitions/internal_api.runtimeWorkerStats'
      status:
        type: string
    type: object
  internal_api.runtimeWorkerStats:
    properties:
      cpu_percent:
        type: number
      memory_limit_bytes:
        type: integer
      memory_usage_bytes:
        type: integer
    type: object
  internal_api.sessionListResponse:
    properties:
      sessions:
        items:
          $ref: '#/definitions/github_com_cynkra_blockyard_internal_db.SessionRow'
        type: array
    type: object
  internal_api.tagResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  internal_api.taskStatusResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      status:
        type: string
    type: object
  internal_api.updateAppRequest:
    properties:
      access_type:
        type: string
      cpu_limit:
        type: number
      description:
        type: string
      max_sessions_per_worker:
        type: integer
      max_workers_per_app:
        type: integer
      memory_limit:
        type: string
      pre_warmed_sessions:
        type: integer
      refresh_schedule:
        type: string
      title:
        type: string
    type: object
  internal_api.updateUserRequest:
    properties:
      active:
        type: boolean
      role:
        type: string
    type: object
  internal_api.uploadBundleResponse:
    properties:
      bundle_id:
        type: string
      task_id:
        type: string
    type: object
  internal_api.vaultExchangeResponse:
    properties:
      token:
        type: string
      ttl:
        type: integer
    type: object
host: localhost:3000
info:
  contact: {}
  description: Blockyard is a platform for deploying and managing Shiny applications.
  title: Blockyard API
  version: "1.0"
paths:
  /apps:
    get:
      description: List apps with RBAC filtering, search, tag filter, and pagination.
        Use ?deleted=true for soft-deleted apps (admin only).
      parameters:
      - description: Search by name/title
        in: query
        name: search
        type: string
      - description: Filter by tag name
        in: query
        name: tag
        type: string
      - description: Show soft-deleted apps (admin only)
        in: query
        name: deleted
        type: boolean
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page (1-100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.appListResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: List apps
      tags:
      - apps
    post:
      consumes:
      - application/json
      description: Create a new application owned by the caller.
      parameters:
      - description: App name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.createAppRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.AppResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Create app
      tags:
      - apps
  /apps/{id}:
    delete:
      description: Soft-delete an app, stopping all workers. Use ?purge=true for permanent
        deletion (admin only, app must be soft-deleted first).
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Permanently delete (admin only)
        in: query
        name: purge
        type: boolean
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete app
      tags:
      - apps
    get:
      description: Get a single application by UUID or name. Returns 404 if not found
        or caller has no access.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.appResponseV2JSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Get app
      tags:
      - apps
    patch:
      consumes:
      - application/json
      description: Update an application's settings. All fields are optional. Changing
        access_type requires owner/admin.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.updateAppRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.appResponseV2JSON'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Update app
      tags:
      - apps
  /apps/{id}/access:
    get:
      description: List all ACL entries for an app. Requires owner or admin role.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.accessGrantResponse'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: List access grants
      tags:
      - access
    post:
      consumes:
      - application/json
      description: Grant a user viewer or collaborator access to an app. Requires
        owner or admin role.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Access grant
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.grantRequest'
      responses:
        "204":
          description: Access granted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Grant access
      tags:
      - access
  /apps/{id}/access/{kind}/{principal}:
    delete:
      description: Remove a specific access grant from an app. Requires owner or admin
        role.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Grant kind (e.g. 'user')
        in: path
        name: kind
        required: true
        type: string
      - description: User sub
        in: path
        name: principal
        required: true
        type: string
      responses:
        "204":
          description: Access revoked
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Revoke access
      tags:
      - access
  /apps/{id}/bundles:
    get:
      description: List all bundles for an app, ordered by upload time.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.bundleListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: List bundles
      tags:
      - bundles
    post:
      consumes:
      - application/gzip
      description: Upload a tar.gz bundle archive. Triggers async restore (package
        installation). Track progress via the returned task_id.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api.uploadBundleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Upload bundle
      tags:
      - bundles
  /apps/{id}/disable:
    post:
      description: Disable an app, draining active sessions and stopping all workers.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.appResponseV2JSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Disable app
      tags:
      - apps
  /apps/{id}/enable:
    post:
      description: Enable an app, allowing it to accept traffic and start workers.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.appResponseV2JSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Enable app
      tags:
      - apps
  /apps/{id}/logs:
    get:
      description: Stream worker logs for an app. Returns buffered output immediately;
        streams live lines unless stream=false.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Worker ID
        in: query
        name: worker_id
        required: true
        type: string
      - description: Set to 'false' to return buffered logs only
        in: query
        name: stream
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Log output (text/plain, chunked)
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Stream app logs
      tags:
      - apps
  /apps/{id}/refresh:
    post:
      description: Start a background dependency refresh for the active bundle. Fails
        if the bundle was deployed with pinned dependencies.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api.asyncTaskResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Refresh dependencies
      tags:
      - refresh
  /apps/{id}/refresh/rollback:
    post:
      description: Roll back to the previous refresh or the original build (?target=build).
        Starts a background task.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: 'Rollback target: ''build'' for original deploy, omit for previous
          refresh'
        in: query
        name: target
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api.asyncTaskResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Rollback refresh
      tags:
      - refresh
  /apps/{id}/restore:
    post:
      description: Restore a soft-deleted app. Only admins and the original owner
        can restore.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.AppResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.errorResponse'
      security:
      - BearerAuth: []
      summary: Restore deleted app
      tags:
      - apps
  /apps/{id}/rollback:
    post:
      consumes:
      - application/json
      description: Switch an app's active bundle to a previous one. Stops running
        workers and activates the target bundle.
      parameters:
      - description: App ID (UUID) or name
        in: path
        name: id
        required: true
        type: string
      - description: Target bundle
        in: body
        name: body
