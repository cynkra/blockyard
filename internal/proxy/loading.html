<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starting {{.AppName}} — blockyard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, sans-serif;
            background: #f8f9fa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .loading {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1.5rem;
            border: 3px solid #e9ecef;
            border-top-color: #495057;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.25rem; font-weight: 500; margin-bottom: 0.5rem; }
        .status { color: #6c757d; font-size: 0.9rem; }
        .error { color: #dc3545; display: none; }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner" id="spinner"></div>
        <h1>Starting <strong>{{.AppName}}</strong></h1>
        <p class="status" id="status">Waiting for the application to start&hellip;</p>
        <p class="error" id="error">
            The application failed to start. Please try again later or
            contact an administrator.
        </p>
    </div>
    <script>
        (function() {
            var readyURL = {{.ReadyURL}};
            var appURL = {{.AppURL}};
            var timeout = {{.TimeoutMs}};
            var interval = 2000;
            var elapsed = 0;

            function poll() {
                fetch(readyURL)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.ready) {
                            window.location.replace(appURL);
                            return;
                        }
                        elapsed += interval;
                        if (elapsed >= timeout) {
                            showError();
                            return;
                        }
                        setTimeout(poll, interval);
                    })
                    .catch(function() {
                        elapsed += interval;
                        if (elapsed >= timeout) {
                            showError();
                            return;
                        }
                        setTimeout(poll, interval);
                    });
            }

            function showError() {
                document.getElementById("spinner").style.display = "none";
                document.getElementById("status").style.display = "none";
                document.getElementById("error").style.display = "block";
            }

            setTimeout(poll, interval);
        })();
    </script>
</body>
</html>
