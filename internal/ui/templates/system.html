{{template "base" .}}

{{define "title"}}System — blockyard{{end}}

{{define "content"}}
<div class="page-header">
    <div class="flex items-center justify-between">
        <h1 class="!m-0">System Checks</h1>
        <button class="btn btn-soft btn-sm"
                hx-post="/ui/system/run"
                hx-target="#check-results"
                hx-swap="innerHTML"
                hx-disabled-elt="this">
            Run Checks
        </button>
    </div>
</div>

<div id="check-results">
{{template "checkResults" .}}
</div>
{{end}}
