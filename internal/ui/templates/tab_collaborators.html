<div class="collaborators-view">
    <div class="field-group">
        <label for="access-type">Access type</label>
        <p class="field-description">Controls who can access this app.</p>
        <div class="field-row">
            <div x-data="dropdown({value: '{{.App.AccessType}}'})" class="dd" @click.outside="open = false">
                <button type="button" class="dd-trigger" @click="toggle()" @keydown="onKeydown($event)"
                        role="combobox" aria-haspopup="listbox" :aria-expanded="open">
                    <span x-text="label" class="dd-label"></span>
                </button>
                <input type="hidden" id="access-type" name="access_type" x-ref="input" :value="value"
                       hx-patch="/api/v1/apps/{{.App.ID}}"
                       hx-trigger="change"
                       hx-target="next .field-feedback"
                       hx-swap="innerHTML"
                       hx-on::after-request="if(event.detail.successful) htmx.ajax('GET', '/ui/apps/{{.App.Name}}/tab/collaborators', '#tab-content')">
                <div x-ref="menu" x-show="open" x-cloak x-transition.opacity.duration.100ms class="dd-menu" role="listbox"
                     @mousedown.prevent="selectClosest($event)">
                    <div role="option" class="dd-item" data-value="public">Public</div>
                    <div role="option" class="dd-item" data-value="logged_in">Logged in</div>
                    <div role="option" class="dd-item" data-value="acl">ACL</div>
                </div>
            </div>
            <span class="field-feedback"></span>
        </div>
    </div>

    {{if eq .App.AccessType "acl"}}
    <div class="acl-section"
         hx-trigger="accessGranted from:body"
         hx-get="/ui/apps/{{.App.Name}}/tab/collaborators"
         hx-target="#tab-content">
        <h3>Access grants</h3>
        {{if .Grants}}
        <table class="acl-table table table-sm w-full">
            <thead><tr><th>User</th><th>Role</th><th></th></tr></thead>
            <tbody>
            {{range .Grants}}
            <tr>
                <td>{{.DisplayName}}</td>
                <td>{{.Role}}</td>
                <td><button class="btn btn-sm btn-error"
                            hx-delete="/api/v1/apps/{{$.App.ID}}/access/user/{{.Principal}}"
                            hx-target="closest tr"
                            hx-swap="outerHTML swap:0.2s">Remove</button></td>
            </tr>
            {{end}}
            </tbody>
        </table>
        {{else}}
        <p class="empty-state">No access grants.</p>
        {{end}}
        <form class="acl-add-form"
              hx-post="/api/v1/apps/{{.App.ID}}/access"
              hx-swap="none"
              hx-on::after-request="if(event.detail.successful){this.querySelectorAll('.dd').forEach(function(el){el.dispatchEvent(new CustomEvent('dd-reset'))})}"
              onsubmit="return document.getElementById('acl-principal').value !== ''">
            <input type="hidden" name="kind" value="user">
            <div x-data="combobox({url: '/ui/users/search?q='})" class="dd"
                 @click.outside="open = false"
                 @dd-reset="query=''; value=''; open=false">
                <input type="text" x-model="query" @input="onInput()" @keydown="onKeydown($event)"
                       @focus="onFocus()" @blur="setTimeout(function(){ open=false; activeIdx=-1 }, 150)"
                       placeholder="Search users..." autocomplete="off" required
                       class="dd-input" role="combobox" aria-haspopup="listbox" :aria-expanded="open">
                <input type="hidden" id="acl-principal" name="principal" x-ref="input" :value="value">
                <div x-ref="menu" x-show="open" x-cloak x-transition.opacity.duration.100ms class="dd-menu" role="listbox"
                     @mousedown.prevent="selectClosest($event)">
                </div>
            </div>
            <div x-data="dropdown({value: 'viewer'})" class="dd"
                 @click.outside="open = false"
                 @dd-reset="value='viewer'; open=false">
                <button type="button" class="dd-trigger" @click="toggle()" @keydown="onKeydown($event)"
                        role="combobox" aria-haspopup="listbox" :aria-expanded="open">
                    <span x-text="label" class="dd-label"></span>
                </button>
                <input type="hidden" name="role" x-ref="input" :value="value">
                <div x-ref="menu" x-show="open" x-cloak x-transition.opacity.duration.100ms class="dd-menu" role="listbox"
                     @mousedown.prevent="selectClosest($event)">
                    <div role="option" class="dd-item" data-value="viewer">Viewer</div>
                    <div role="option" class="dd-item" data-value="collaborator">Collaborator</div>
                </div>
            </div>
            <button type="submit" class="btn btn-soft btn-sm">Add</button>
        </form>
    </div>
    {{end}}
</div>
