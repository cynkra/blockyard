{{template "base" .}}

{{define "title"}}Profile — blockyard{{end}}

{{define "content"}}
<div class="page-header">
    <h1>Profile</h1>
</div>
<div class="profile-section">
    <div class="flex items-center gap-3 mb-1">
        <p class="text-lg font-semibold m-0">{{.User.DisplayName}}</p>
        <span class="badge badge-soft badge-info badge-sm">{{.User.Role}}</span>
    </div>
    <p class="text-sm text-base-content/60 m-0 mb-4">{{.User.Email}}</p>
    <form method="POST" action="/logout">
        <button type="submit" class="btn btn-soft btn-sm">Sign out</button>
    </form>
</div>

<div id="tokens" class="pat-section">
    <h2>Personal Access Tokens</h2>
    <p class="section-description">Tokens authenticate against the blockyard API.
       Treat them like passwords.</p>

    <form class="pat-create-form"
          hx-post="/ui/tokens"
          hx-target="#pat-result"
          hx-swap="innerHTML">
        <input type="text" name="name" placeholder="Token name (e.g., CI deploy)" required>
        <select name="expires_in" class="select select-sm text-sm">
            <option value="30d">30 days</option>
            <option value="90d" selected>90 days</option>
            <option value="365d">1 year</option>
            <option value="">No expiry</option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">Create token</button>
    </form>
    <div id="pat-result"></div>

    <div id="token-list">
    {{template "tokenList" .Tokens}}
    </div>
</div>
{{end}}
