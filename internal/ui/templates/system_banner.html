{{if and .IsAdmin .HasWarnings}}
<div class="alert alert-warning mb-4 text-sm">
    <svg class="stroke-current shrink-0 h-5 w-5"><use href="#i-alert-circle"/></svg>
    <span>{{.Errors}} error{{if ne .Errors 1}}s{{end}} and {{.Warnings}} warning{{if ne .Warnings 1}}s{{end}} detected.</span>
    <a href="/system" class="link link-primary font-medium">View details</a>
</div>
{{end}}
