<div class="overview-grid">
    <div class="stats bg-base-200/50 shadow-sm">
        <div class="stat">
            <div class="stat-title">Status</div>
            <div class="stat-value text-lg flex items-center gap-2">
                <span class="status {{statusDotClass .Status}} {{if eq .Status "running"}}status-pulse{{end}}"></span>
                {{.Status}}
            </div>
            <div class="stat-desc">Last deployed <span class="time-ago" data-timestamp="{{.LastDeployed}}">{{.LastDeployed | timeAgo}}</span></div>
        </div>
    </div>
    <div class="stats bg-base-200/50 shadow-sm">
        <div class="stat">
            <div class="stat-title">Workers</div>
            <div class="stat-value text-lg">{{.ActiveWorkers}} active</div>
            <div class="stat-desc">{{.ActiveSessions}} sessions</div>
        </div>
    </div>
    <div class="stats bg-base-200/50 shadow-sm">
        <div class="stat">
            <div class="stat-title">Activity</div>
            <div class="stat-value text-lg">{{.TotalViews}} views</div>
            <div class="stat-desc">{{.RecentViews}} last 7 days</div>
        </div>
    </div>
    <div class="stats bg-base-200/50 shadow-sm">
        <div class="stat">
            <div class="stat-title">Bundle</div>
            {{if .ActiveBundle}}
            <div class="stat-value text-lg font-mono text-xs" title="{{.ActiveBundle.ID}}">{{.ActiveBundle.ID | truncate}}</div>
            <div class="stat-desc"><span class="status-badge status-{{.ActiveBundle.Status}}">{{.ActiveBundle.Status}}</span></div>
            {{else}}
            <div class="stat-value text-lg text-base-content/40">None</div>
            {{end}}
        </div>
    </div>
</div>
