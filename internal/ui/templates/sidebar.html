<div class="sidebar-header">
    <div class="flex items-center gap-2 flex-1 min-w-0">
        <div class="tooltip tooltip-bottom" data-tip="{{.Status}}">
            <span class="status {{statusDotClass .Status}} "></span>
        </div>
        <h2 class="text-lg flex-1 m-0 font-semibold truncate">{{.App.Name}}</h2>
    </div>
    <div class="flex items-center gap-1">
        <a href="/app/{{.App.Name}}/" target="_blank" title="Open app"
           class="btn btn-ghost btn-sm btn-square">
            <svg width="18" height="18"><use href="#i-external-link"/></svg>
        </a>
        <label for="sidebar-toggle" onclick="closeSidebar()" class="btn btn-ghost btn-sm btn-square" aria-label="Close">
            <svg width="18" height="18"><use href="#i-x"/></svg>
        </label>
    </div>
</div>
{{if .App.Title}}<p class="sidebar-subtitle">{{deref .App.Title}}</p>{{end}}
<nav class="sidebar-tabs">
    <button class="tab tab-active"
            hx-get="/ui/apps/{{.App.Name}}/tab/overview"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Overview</button>
    <button class="tab"
            hx-get="/ui/apps/{{.App.Name}}/tab/settings"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Settings</button>
    <button class="tab"
            hx-get="/ui/apps/{{.App.Name}}/tab/runtime"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Runtime</button>
    <button class="tab"
            hx-get="/ui/apps/{{.App.Name}}/tab/bundles"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Bundles</button>
    {{if .CanManageACL}}
    <button class="tab"
            hx-get="/ui/apps/{{.App.Name}}/tab/collaborators"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Collaborators</button>
    {{end}}
    <button class="tab"
            hx-get="/ui/apps/{{.App.Name}}/tab/logs"
            hx-target="#tab-content"
            hx-on::after-request="setActiveTab(this)">Logs</button>
</nav>
<div id="tab-content">{{.OverviewHTML}}</div>
